<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>IMC EU Option Coverage</title>
  <style>
    :root{
      --imc-navy:#003865; --imc-sky:#0082ba; --imc-bg:#0a2c52;
      --glass-bg:rgba(255,255,255,0.08); --glass-brd:rgba(255,255,255,0.25);
      --text:#eaf3fb; --muted:#b7c7d7; --focus:#1abaff;
      --row-bdr: rgba(255,255,255,0.12);
    }
    html{scroll-behavior:smooth} *{box-sizing:border-box}

    body{
      margin:0; font-family:Calibri, Verdana, Arial, sans-serif; color:var(--text);
      background:
        radial-gradient(1200px 600px at 70% 10%, rgba(0,130,186,0.18), transparent 60%),
        linear-gradient(180deg,#0b2a4a 0%, var(--imc-navy) 60%, #06203a 100%);
      min-height:100dvh; overflow-x:hidden;
    }

    .header{
      position:sticky; top:0; z-index:1000; backdrop-filter:blur(10px);
      background:linear-gradient(180deg, rgba(0,56,101,0.92), rgba(0,56,101,0.65));
      border-bottom:1px solid rgba(255,255,255,0.10);
      padding:16px 22px; display:flex; align-items:center; gap:18px;
    }
    .brand img{height:48px}

    .hero{
      position:relative; min-height:36vh; display:flex; align-items:flex-end;
      padding:40px 24px 24px;
      background-image:url("IMC_kaart_29_03_2025_CMYK_background__1_.jpg");
      background-size:cover; background-position:center;
      filter:brightness(1.05) contrast(1.15); isolation:isolate;
    }
    .hero::before{content:""; position:absolute; inset:0;
      background:radial-gradient(90% 60% at 50% 30%, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.25) 100%)}
    .hero::after{content:""; position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(0,56,101,0.35) 0%, rgba(0,56,101,0.55) 60%, rgba(0,56,101,0.70) 100%);
      mix-blend-mode:multiply}
    .hero-content{max-width:1100px; width:100%; margin:0 auto; position:relative; z-index:1; text-shadow:0 3px 14px rgba(0,0,0,.35); text-align:center;}
    .title{font-size:clamp(26px,4.4vw,46px); margin:0; color:#fff}

    .toolbar{
      width:min(1100px, 92%); margin: 16px auto 0; display:grid; gap:14px;
    }
    .tabs{
      display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px;
    }
    .tab{
      background: var(--glass-bg);
      border:1px solid var(--glass-brd);
      color:#e8f6ff; text-align:center; padding:12px 10px; border-radius:12px;
      font-weight:700; cursor:pointer; user-select:none;
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
    }
    .tab:hover{ transform:translateY(-1px); box-shadow:0 8px 20px rgba(0,0,0,.25); }
    .tab.active{ background: linear-gradient(180deg, var(--imc-sky), #0074a3); border-color: transparent; }

    .controls{
      display:flex; justify-content:center; align-items:center; gap:12px; flex-wrap:wrap;
      background: var(--glass-bg); border:1px solid var(--glass-brd);
      padding:10px 20px; border-radius:12px; width:fit-content; margin:0 auto;
    }
    .controls label{ font-size:12px; color:#cfe9f9; margin-right:6px; letter-spacing:.3px; text-transform:uppercase; }
    .select{
      appearance:none; background:rgba(255,255,255,0.06); color:#fff; border:1px solid var(--glass-brd);
      padding:8px 10px; border-radius:10px; min-width:220px; font-family:inherit; font-size:14px;
      backdrop-filter: blur(6px);
    }
    .select:focus-visible{ outline:2px solid var(--focus); outline-offset:2px; }

    .container{ width:min(1100px, 92%); margin: 16px auto 60px; }

    .table-wrap{
      overflow:auto; background:var(--glass-bg); border:1px solid var(--glass-brd);
      border-radius:16px; box-shadow:0 14px 40px rgba(0,0,0,.30); backdrop-filter:blur(8px);
    }
    table{ width:100%; border-collapse:collapse; min-width:700px; }
    thead th{
      position:sticky; top:0; background:rgba(0,56,101,0.85); color:#eaf3fb;
      font-weight:800; font-size:13px; letter-spacing:.3px; text-transform:uppercase;
      padding:12px; border-bottom:1px solid var(--row-bdr); text-align:left;
    }
    tbody td{
      padding:12px; border-bottom:1px solid var(--row-bdr); font-size:15px; vertical-align:middle;
    }
    tbody tr:hover{ background:rgba(255,255,255,0.04); }

    footer{text-align:center; color:var(--muted); padding:36px 12px 48px; font-size:12px}

    td a { color:#9bd5ff; text-decoration:none; border-bottom:1px dashed rgba(155,213,255,.6); }
    td a:hover { text-decoration:underline; }
  </style>
</head>

      {'Eurex MBTS': '350','Euronext LIS post-trade': ' 1,275 ','Name': 'Porsche Automobil Holding SE','Ticker': 'PAH3'},
      {'Eurex MBTS': '300','Euronext LIS post-trade': ' 905 ','Name': 'Prosus NV','Ticker': 'PRX'},
      {'Eurex MBTS': '75','Euronext LIS post-trade': null,'Name': 'PUMA SE','Ticker': 'PUM'},
      {'Eurex MBTS': '100','Euronext LIS post-trade': ' 80 ','Name': 'Ferrari NV','Ticker': 'RACE'},
      {'Eurex MBTS': '50','Euronext LIS post-trade': ' 150 ','Name': 'Rheinmetall AG','Ticker': 'RHM'},
      {'Eurex MBTS': '150','Euronext LIS post-trade': ' 225 ','Name': 'Pernod Ricard SA','Ticker': 'RI'},
      {'Eurex MBTS': '25','Euronext LIS post-trade': ' 260 ','Name': 'Hermès International SCA','Ticker': 'RMS'},
      {'Eurex MBTS': '400','Euronext LIS post-trade': ' 575 ','Name': 'Renault SA','Ticker': 'RNO'},
      {'Eurex MBTS': '1000','Euronext LIS post-trade': ' 1,690 ','Name': 'RWE AG','Ticker': 'RWE'},
      {'Eurex MBTS': '150','Euronext LIS post-trade': ' 200 ','Name': 'Safran SA','Ticker': 'SAF'},
      {'Eurex MBTS': '200','Euronext LIS post-trade': ' 300 ','Name': 'SAP SE','Ticker': 'SAP'},
      {'Eurex MBTS': '300','Euronext LIS post-trade': '395','Name': 'Compagnie de Saint-Gobain SA','Ticker': 'SGO'},
      {'Eurex MBTS': '1250','Euronext LIS post-trade': ' 1,755 ','Name': 'Shell Plc','Ticker': 'SHELL'},
      {'Eurex MBTS': '200','Euronext LIS post-trade': ' 3,500 ','Name': 'Siemens AG','Ticker': 'SIE'},
      {'Eurex MBTS': '200','Euronext LIS post-trade': ' 615 ','Name': 'Stellantis NV','Ticker': 'STLAP'},
      {'Eurex MBTS': '500','Euronext LIS post-trade': ' 325 ','Name': 'STMicroelectronics NV','Ticker': 'STMPA'},
      {'Eurex MBTS': '200','Euronext LIS post-trade': ' 300 ','Name': 'Schneider Electric SE','Ticker': 'SU'},
      {'Eurex MBTS': '750','Euronext LIS post-trade': '900','Name': 'TotalEnergies SE','Ticker': 'TTE'},
      {'Eurex MBTS': '500','Euronext LIS post-trade': ' 315 ','Name': 'UniCredit SpA','Ticker': 'UCG'},
      {'Eurex MBTS': '300','Euronext LIS post-trade': ' 750 ','Name': 'Unibail-Rodamco-Westfield SE','Ticker': 'URW'},
      {'Eurex MBTS': '250','Euronext LIS post-trade': ' 1,050 ','Name': 'Veolia Environnement SA','Ticker': 'VIE'},
      {'Eurex MBTS': '750','Euronext LIS post-trade': ' 1,920 ','Name': 'Vonovia SE','Ticker': 'VNA'},
      {'Eurex MBTS': '200','Euronext LIS post-trade': null,'Name': 'Volkswagen AG ','Ticker': 'VOW3'},
      {'Eurex MBTS': '400','Euronext LIS post-trade': ' 510 ','Name': 'Zalando SE','Ticker': 'ZAL'}
    ];
    const _cleanVal = (v) => { if (v == null) return null; const s=String(v).replace(/,/g,'').trim(); return s===""?"manual check":s; };
    const DIRECT_EUREX_BLOCK={}, DIRECT_EURONEXT_BLOCK={};
    for (const r of RESULT_LIST) {
      DIRECT_EUREX_BLOCK[r.Ticker]=_cleanVal(r['Eurex MBTS']);
      DIRECT_EURONEXT_BLOCK[r.Ticker]=_cleanVal(r['Euronext LIS post-trade']);
    }
    const getEurexBlock = (k)=> (k in DIRECT_EUREX_BLOCK?DIRECT_EUREX_BLOCK[k]:"manual check");
    const getEuronextBlock = (k)=> (k in DIRECT_EURONEXT_BLOCK?DIRECT_EURONEXT_BLOCK[k]:"manual check");

    /* ===== Universes ===== */
    const UNIVERSE = {
      single: Object.keys(COMPANY_SECTORS),
      index: ["SX5E (1000)", "SX7E", "SXXP", "V2X", "DAX", "SMI", "FTSEMIB", "CAC", "AEX", "FTSE", "ES", "NKY"],
      fx: Array.from(new Set([
        "EUCO","PUCO","UFCO","AUCO","UYCO","NUCO",
        "EURUSD","GBPUSD","USDCHF","AUDUSD","USDJPY","NZDUSD"
      ]))
    };

    /* ===== Utils ===== */
    const sectorsByName = () => {
      const map = {};
      for (const [c,s] of Object.entries(COMPANY_SECTORS)){ (map[s] ||= []).push(c); }
      for (const s of Object.keys(map)) map[s].sort();
      return Object.fromEntries(Object.entries(map).sort((a,b)=> a[0].localeCompare(b[0])));
    };
    const populateSectorDropdown = ()=>{
      const sel = document.getElementById("sectorSelect");
      const secs = Object.keys(sectorsByName());
      for (const s of secs){
        const opt = document.createElement("option");
        opt.value = s; opt.textContent = s;
        sel.appendChild(opt);
      }
    };

    /* ===== FX helpers ===== */
    const LISTED_TO_PAIR = {
      EUCO:"EUR/USD", PUCO:"GBP/USD", UFCO:"USD/CHF", AUCO:"AUD/USD",
      UYCO:"USD/JPY", NUCO:"NZD/USD"
    };
    const FX_BBG_TICKER = {
      EUCO:"EURUSD Curncy", PUCO:"GBPUSD Curncy", UFCO:"USDCHF Curncy", AUCO:"AUDUSD Curncy",
      UYCO:"USDJPY Curncy", NUCO:"NZDUSD Curncy"
    };
    const EUREX_LINKS = {
      AUCO: "https://www.eurex.com/ex-en/markets/fx/currency-pairs/Options-on-AUD-USD-Futures-950536",
      EUCO: "https://www.eurex.com/ex-en/markets/fx/currency-pairs/Options-on-EUR-USD-Futures-950954",
      UYCO: "https://www.eurex.com/ex-en/markets/fx/currency-pairs/Options-on-EUR-USD-Futures-950954g",
      PUCO: "https://www.eurex.com/ex-en/markets/fx/currency-pairs/Options-on-GBP-USD-Futures-951060",
      NUCO: "https://www.eurex.com/ex-en/markets/fx/currency-pairs/Options-on-NZD-USD-Futures-950548",
      UFCO: "https://www.eurex.com/ex-en/markets/fx/currency-pairs/Options-on-USD-CHF-Futures-951034"
    };
    function formatEurexLink(code){
      if (!code || code === "—") return "—";
      const url = EUREX_LINKS[code];
      return url ? `<a href="${url}" target="_blank" rel="noopener noreferrer" title="Open on Eurex">${code}</a>` : code;
    }

    const getFxBbg = (sym) => {
      if (FX_BBG_TICKER[sym]) return FX_BBG_TICKER[sym];
      if (/^[A-Z]{6}$/.test(sym)) return sym + " Curncy";
      return "—";
    };
    const pairText = (sym) => {
      if (LISTED_TO_PAIR[sym]) return LISTED_TO_PAIR[sym];
      if (/^[A-Z]{6}$/.test(sym)) return sym.slice(0,3) + "/" + sym.slice(3);
      return sym;
    };
    const LISTED_FX_BLOCK_SIZE = "1";
    const fxEurexCode = (sym) => (LISTED_TO_PAIR[sym] ? sym : "—");
    const fxBlockSize = (sym) => (LISTED_TO_PAIR[sym] ? LISTED_FX_BLOCK_SIZE : "—");

    const CME_CODE_BY_PAIR = {
      "AUD/USD":"ADU", "EUR/USD":"EUU", "GBP/USD":"GBU",
      "NZD/USD":"6N", "USD/CHF":"CHU", "USD/JPY":"JPU"
    };
    const CME_BLOCK_SIZE = {
      "ADU":"250", "EUU":"250", "GBU":"250", "6N":"50", "CHU":"250", "JPU":"250"
    };
    const CME_FX_LINKS = {
      "EUU":"https://www.cmegroup.com/markets/fx/g10/euro-fx.contractSpecs.options.html",
      "ADU":"https://www.cmegroup.com/markets/fx/g10/australian-dollar.contractSpecs.options.html",
      "GBU":"https://www.cmegroup.com/markets/fx/g10/british-pound.contractSpecs.options.html",
      "6N":"https://www.cmegroup.com/markets/fx/g10/new-zealand-dollar.quotes.html",
      "CHU":"https://www.cmegroup.com/markets/fx/g10/swiss-franc.html",
      "JPU":"https://www.cmegroup.com/markets/fx/g10/japanese-yen.contractSpecs.options.html"
    };
    function fxCmeCode(sym){
      const p = pairText(sym);
      return CME_CODE_BY_PAIR[p] || "—";
    }
    function fxCmeBlockSize(sym){
      const code = fxCmeCode(sym);
      return code && CME_BLOCK_SIZE[code] ? CME_BLOCK_SIZE[code] : "—";
    }
    function formatCmeLink(code){
      if (!code || code==="—") return "—";
      const url = CME_FX_LINKS[code];
      return url
        ? `<a href="${url}" target="_blank" rel="noopener noreferrer" title="Open CME FX Options">${code}</a>`
        : code;
    }

    function uniqueFxSymbols(){
      const byPair = {};
      for (const sym of UNIVERSE.fx){
        const p = pairText(sym);
        const isListed = !!LISTED_TO_PAIR[sym];
        if (!byPair[p] || (isListed && !byPair[p].isListed)){
          byPair[p] = { sym, isListed, pair: p };
        }
      }
      return Object.values(byPair)
        .sort((a,b)=> a.pair.localeCompare(b.pair))
        .map(x=> x.sym);
    }

    /* ===== Render table ===== */
    const renderTable = (type="single")=>{
      let pool = UNIVERSE[type].slice();

      if (type === "single") {
        const sector = document.getElementById("sectorSelect").value;
        if (sector && sector !== "ALL"){
          pool = pool.filter(t => COMPANY_SECTORS[t] === sector);
        }
      }

      pool.sort((a,b) => (NAMES_ONLY[a]||a).localeCompare(NAMES_ONLY[b]||b));

      const theadRow = document.querySelector('#coverageTable thead tr');
      if (type === "index") {
        theadRow.innerHTML = `
          <th>BBG Ticker</th>
          <th>Name</th>
          <th>Exchange Ticker</th>
          <th>Block Size</th>
        `;
      } else if (type === "fx") {
        theadRow.innerHTML = `
          <th>BBG Ticker</th>
          <th>OTC Pair</th>
          <th>Eurex Code</th>
          <th>Block Size</th>
          <th>CME Block Size</th>
          <th>CME Code</th>
        `;
      } else {
        theadRow.innerHTML = `
          <th>BBG Ticker</th>
          <th>Name</th>
          <th>Eurex Ticker</th>
          <th>Eurex Block Size</th>
          <th>Euronext Ticker</th>
          <th>Euronext Block Size</th>
        `;
      }

      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      let symbolsToRender = pool;
      if (type === "fx") {
        symbolsToRender = uniqueFxSymbols();
      }

      for (const t of symbolsToRender){
        const tr = document.createElement("tr");

        if (type === "index") {
          const k = normalizeIndexKey(t);
          const bbg  = INDEX_BBG_TICKER[k] || "—";
          const name = ({SX5E:"EURO STOXX 50 Index", SX7E:"EURO STOXX Banks Index", SXXP:"STOXX Europe 600 Index",
                         V2X:"EURO STOXX 50 Volatility Index", DAX:"DAX Index", SMI:"Swiss Market Index",
                         FTSEMIB:"FTSE MIB Index", CAC:"CAC 40 Index", AEX:"AEX Index", FTSE:"FTSE 100 Index",
                         ES:"S&P 500 E-mini Futures", NKY:"Nikkei 225 Index"})[k] || t;
          const exch = show(INDEX_EXCHANGE_TICKER[k]);
          const block= show(getIndexBlockSize(t));
          tr.innerHTML += `<td>${bbg}</td><td>${name}</td><td>${exch}</td><td>${block}</td>`;

        } else if (type === "fx") {
          const otcName = getFxBbg(t);
          const pair    = pairText(t);
          const eurex   = fxEurexCode(t);
          const blk     = fxBlockSize(t);
          const cmeBlk  = fxCmeBlockSize(t);
          const cmeCode = fxCmeCode(t);
          tr.innerHTML += `
            <td>${otcName}</td>
            <td>${pair}</td>
            <td>${formatEurexLink(eurex)}</td>
            <td>${blk}</td>
            <td>${cmeBlk}</td>
            <td>${formatCmeLink(cmeCode)}</td>
          `;

        } else {
          const bbg   = SINGLE_BBG_TICKER[t] || "—";
          const name  = NAMES_ONLY[t] || t;
          const eurex = (t in EUREX_TICKER) ? EUREX_TICKER[t] : "—";
          const eublk = show(getEurexBlock(t));
          const enxtRaw  = (t in EURONEXT_TICKER) ? EURONEXT_TICKER[t] : "—";
          const enxt = show(enxtRaw);
          const enblk = show(getEuronextBlock(t));
          tr.innerHTML += `<td>${bbg}</td><td>${name}</td><td>${eurex}</td><td>${eublk}</td><td>${enxt}</td><td>${enblk}</td>`;
        }

        document.getElementById("tableBody").appendChild(tr);
      }

      document.querySelector('.controls').style.display = type === 'single' ? 'flex' : 'none';
    };

    /* ===== Tabs + init ===== */
    const tabs = document.querySelectorAll(".tab");
    let currentType = "single";
    tabs.forEach(tab=>{
      tab.addEventListener("click", ()=>{
        tabs.forEach(t=>{ t.classList.remove("active"); t.setAttribute("aria-selected","false"); });
        tab.classList.add("active"); tab.setAttribute("aria-selected","true");
        currentType = tab.dataset.type;
        renderTable(currentType);
      });
      tab.addEventListener("keydown",(e)=>{ if (e.key==="Enter"||e.key===" "){ e.preventDefault(); tab.click(); } });
    });

    document.getElementById("sectorSelect").addEventListener("change", ()=> renderTable(currentType));

    populateSectorDropdown();
    renderTable("single");
  </script>
</body>
